; PlatformIO Project Configuration File
; https://docs.platformio.org/page/projectconf.html
;
; Quick start:
;   1. Install PlatformIO (VS Code extension or CLI)
;   2. Open the Wifi-Serial-AP-AIS-CAN/ folder in VS Code
;   3. Set your COM port below (or let PlatformIO auto-detect)
;   4. Click Upload (or: pio run --target upload)

[platformio]
src_dir = .

[env:nodemcu-32s]
platform = espressif32
board = nodemcu-32s
framework = arduino

; ── Libraries ─────────────────────────────────────────────────────────────────
; NMEA2000 libraries fetched directly from GitHub (registry tags are unreliable)
lib_deps =
    https://github.com/ttlappalainen/NMEA2000.git#master
    https://github.com/ttlappalainen/NMEA2000_esp32.git#master
    https://github.com/ttlappalainen/NMEA0183.git#master
    knolleary/PubSubClient @ ^2.8.0
    h2zero/NimBLE-Arduino @ ^1.4.2
    paulstoffregen/OneWire @ ^2.3.8
    milesburton/DallasTemperature @ ^3.11.0
    mathertel/OneButton @ ^2.5.0
    bblanchon/ArduinoJson @ ^7.0.0

; NimBLE-Arduino replaces the standard ESP32 BLE stack — must be ignored
lib_ignore =
    ESP32 BLE Arduino

; ── Flash partition ───────────────────────────────────────────────────────────
; huge_app.csv gives a 3 MB app partition — required: MQTT TLS + NimBLE won't
; fit in the default 1.2 MB partition.
board_build.partitions = huge_app.csv

; ── Serial port ───────────────────────────────────────────────────────────────
; Set upload_port / monitor_port to your COM port (Windows: COMx, Linux/Mac: /dev/ttyUSBx)
; Leave commented to let PlatformIO auto-detect.
; upload_port = COM7
; monitor_port = COM7
upload_speed = 921600
monitor_speed = 115200
monitor_filters = time, esp32_exception_decoder
